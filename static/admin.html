<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>승인 관리 | 올더뮤 검수봇 v3</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app admin-standalone">
      <header class="topbar">
        <div class="brand">
          <div class="brand-title">승인 관리</div>
          <div class="brand-sub">Slack에는 아무것도 보내지 않습니다. 여기서만 승인/폐기/충돌 처리합니다.</div>
        </div>
        <nav class="modes">
          <a class="admin-link" href="/static/index.html">검수 화면</a>
          <button id="refreshBtn" class="mode-btn">새로고침</button>
        </nav>
      </header>

      <main class="chat">
        <p class="admin-standalone-hint" style="padding:12px 16px;margin:0;font-size:13px;color:var(--on-surface-variant);line-height:1.5">
          이 페이지는 최대 100건만 표시합니다. 필터·더 보기·전체 목록은
          <a href="/static/index.html" style="color:var(--primary)">검수 화면</a>
          → <strong>슬랙 승인 대기</strong> 탭에서 이용해 주세요.
        </p>
        <div class="chat-log">
          <div id="cards" style="display:flex;flex-direction:column;gap:12px"></div>
        </div>
      </main>

      <footer class="composer">
        <div class="hint">
          자동 갱신: 30초마다(페이지 열려있는 동안) · <span id="status">대기중...</span>
        </div>
      </footer>
    </div>

    <script src="/static/admin.js"></script>
  </body>
</html>
